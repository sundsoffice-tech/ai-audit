name: Build and deploy docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install mkdocs-material
        run: pip install "mkdocs-material>=9.5" "mkdocs>=1.6"

      - name: Generate llms-full.txt from docs
        run: python scripts/build_llms_full.py

      - name: Build site
        run: mkdocs build --strict

      - name: Copy llms.txt files to site root verbatim
        # mkdocs treats .txt as static and copies them, but we double-check
        # the URL paths so / and /llms.txt and /llms-full.txt all resolve.
        run: |
          test -f site/llms.txt
          test -f site/llms-full.txt
          ls -la site/llms*.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
